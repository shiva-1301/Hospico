server:
  port: ${X_ZOHO_CATALYST_LISTEN_PORT:${PORT:8080}}
  address: 0.0.0.0

spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  main:
    lazy-initialization: true
    banner-mode: off
    log-startup-info: false
    allow-bean-definition-overriding: true
    allow-circular-references: true
  sql:
    init:
      mode: never
  devtools:
    restart:
      enabled: false
  jmx:
    enabled: false
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/HospiiCo}
      database: ${MONGODB_DB:HospiiCo}

data:
  store:
    provider: ${DATA_STORE_PROVIDER:mongo}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true

application:
  name: hospital-booking-backend

groq:
  api:
    key: ${GROQ_API_KEY}
