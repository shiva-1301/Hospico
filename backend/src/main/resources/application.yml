server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  main:
    lazy-initialization: true
    banner-mode: off
    log-startup-info: false
    allow-bean-definition-overriding: true
    allow-circular-references: true
  sql:
    init:
      mode: never
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        temp:
          use_jdbc_metadata_defaults: false
        jdbc:
          time_zone: UTC
          batch_size: 10
        order_updates: true
        order_inserts: true
  devtools:
    restart:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true

application:
  name: hospital-booking-backend

groq:
  api:
    key: ${GROQ_API_KEY}
