# Zoho Data Store Configuration
zoho.enabled=true
zoho.project.id=26566000000013009
zoho.env.id=60061261997
zoho.region=accounts.zoho.in
zoho.users.table.id=users
zoho.client.id=${ZOHO_CLIENT_ID}
zoho.client.secret=${ZOHO_CLIENT_SECRET}
zoho.refresh.token=${ZOHO_REFRESH_TOKEN}

# Data store provider
data.store.provider=zoho

# Exclude JPA/Datasource Auto-configuration (Safety net)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
