<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>HospiiCo - Smart Healthcare Platform | Find Hospitals & Book Appointments</title>
    <meta name="title" content="HospiiCo - Smart Healthcare Platform | Find Hospitals & Book Appointments" />
    <meta name="description" content="HospiiCo is an AI-powered healthcare platform that helps you find nearby hospitals, search by specialization, get symptom analysis, and book appointments. Your trusted medical assistant 24/7." />
    <meta name="keywords" content="hospital finder, healthcare platform, medical appointments, symptom checker, AI health assistant, hospital search, medical records, HospiiCo, healthcare app, hospiico, Hospiico" />
    <meta name="author" content="HospiiCo" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.hospiico.com/" />
    <meta property="og:title" content="HospiiCo - Smart Healthcare Platform" />
    <meta property="og:description" content="Find nearby hospitals, get symptom analysis, and book appointments with our AI-powered healthcare assistant." />
    <meta property="og:image" content="https://www.hospiico.com/Logo.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.hospiico.com/" />
    <meta property="twitter:title" content="HospiiCo - Smart Healthcare Platform" />
    <meta property="twitter:description" content="Find nearby hospitals, get symptom analysis, and book appointments with our AI-powered healthcare assistant." />
    <meta property="twitter:image" content="https://www.hospiico.com/Logo.png" />
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalWebPage",
      "name": "HospiiCo",
      "description": "AI-powered healthcare platform for finding hospitals and booking appointments",
      "url": "https://www.hospiico.com",
      "publisher": {
        "@type": "Organization",
        "name": "HospiiCo",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.hospiico.com/Logo.png"
        }
      },
      "specialty": "Healthcare Technology",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.hospiico.com/find-hospitals?q={search_term}",
        "query-input": "required name=search_term"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display: none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en' },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
